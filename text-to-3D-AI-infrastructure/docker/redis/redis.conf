# ==============================================================================
# OptiForge3D - Redis Configuration
# ==============================================================================
# This is a minimal Redis configuration for development
# For production, review and tune based on workload
# ==============================================================================

# ------------------------------------------------------------------------------
# NETWORK
# ------------------------------------------------------------------------------
# Bind to all interfaces (required for Docker networking)
# Default: 127.0.0.1 (localhost only)
bind 0.0.0.0

# Protected mode prevents external connections without password
# Set to 'no' because we're using Docker network isolation
# In production with exposed ports, set to 'yes' and use requirepass
protected-mode no

# Port to listen on
port 6379

# TCP listen backlog
# Higher values = more queued connections
tcp-backlog 511

# Close connection after client is idle for N seconds (0 = disabled)
timeout 0

# TCP keepalive
# If non-zero, sends TCP ACKs to detect dead peers
tcp-keepalive 300

# ------------------------------------------------------------------------------
# GENERAL
# ------------------------------------------------------------------------------
# Run as daemon? No, because Docker manages the process
daemonize no

# Process ID file (not needed in Docker)
# pidfile /var/run/redis_6379.pid

# Log level: debug, verbose, notice, warning
loglevel notice

# Log to stdout (Docker captures this)
logfile ""

# Number of databases (0-15 by default)
databases 16

# ------------------------------------------------------------------------------
# PERSISTENCE - SNAPSHOTTING (RDB)
# ------------------------------------------------------------------------------
# Save the DB to disk if both conditions are met:
# save <seconds> <changes>

# After 3600 seconds (1 hour) if at least 1 key changed
save 3600 1

# After 300 seconds (5 min) if at least 100 keys changed
save 300 100

# After 60 seconds (1 min) if at least 10000 keys changed
save 60 10000

# Stop accepting writes if RDB snapshots fail
# Prevents data loss when disk is full
stop-writes-on-bgsave-error yes

# Compress RDB files with LZF
rdbcompression yes

# Checksum RDB files
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# Working directory for RDB and AOF files
dir /data

# ------------------------------------------------------------------------------
# PERSISTENCE - APPEND ONLY FILE (AOF)
# ------------------------------------------------------------------------------
# Enable AOF persistence (more durable than RDB)
# AOF logs every write operation
appendonly yes

# AOF filename
appendfilename "appendonly.aof"

# fsync policy: always, everysec, no
# everysec = good balance between performance and durability
appendfsync everysec

# Don't fsync during BGSAVE or BGREWRITEAOF
no-appendfsync-on-rewrite no

# Automatic AOF rewrite
# Rewrite AOF file when it grows by this percentage
auto-aof-rewrite-percentage 100

# Minimum size for AOF rewrite
auto-aof-rewrite-min-size 64mb

# Load truncated AOF file on startup
aof-load-truncated yes

# AOF timestamp annotations
aof-use-rdb-preamble yes

# ------------------------------------------------------------------------------
# MEMORY MANAGEMENT
# ------------------------------------------------------------------------------
# Max memory limit (commented out = no limit)
# For production, set based on available RAM
# maxmemory 256mb

# Memory eviction policy when maxmemory is reached
# allkeys-lru = Remove least recently used keys
# volatile-lru = Remove LRU keys with TTL set
# volatile-ttl = Remove keys with nearest expire time
# noeviction = Return errors when memory limit is reached
maxmemory-policy allkeys-lru

# LRU/LFU algorithm samples
maxmemory-samples 5

# ------------------------------------------------------------------------------
# LAZY FREEING
# ------------------------------------------------------------------------------
# Perform slow operations in background threads
# Improves responsiveness for DEL, FLUSHDB, FLUSHALL
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# ------------------------------------------------------------------------------
# SECURITY
# ------------------------------------------------------------------------------
# Require password for connections
# Uncomment and set strong password for production
# requirepass your_strong_password_here

# Disable dangerous commands
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command CONFIG ""

# ------------------------------------------------------------------------------
# CLIENTS
# ------------------------------------------------------------------------------
# Max number of connected clients
maxclients 10000

# ------------------------------------------------------------------------------
# SLOW LOG
# ------------------------------------------------------------------------------
# Log commands that take longer than N microseconds
slowlog-log-slower-than 10000

# Max length of slow log
slowlog-max-len 128

# ------------------------------------------------------------------------------
# LATENCY MONITOR
# ------------------------------------------------------------------------------
# Latency monitoring threshold in milliseconds
latency-monitor-threshold 0

# ------------------------------------------------------------------------------
# EVENT NOTIFICATION
# ------------------------------------------------------------------------------
# Notify clients of keyspace events
# K = keyspace events (key-based)
# E = keyevent events (event-based)
# g = generic commands (DEL, EXPIRE, etc)
# $ = string commands
# l = list commands
# s = set commands
# h = hash commands
# z = sorted set commands
# x = expired events
# e = evicted events
# notify-keyspace-events ""

# ------------------------------------------------------------------------------
# ADVANCED CONFIG
# ------------------------------------------------------------------------------
# Hash table optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List optimization
list-max-ziplist-size -2
list-compress-depth 0

# Set optimization
set-max-intset-entries 512

# Sorted set optimization
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog optimization
hll-sparse-max-bytes 3000

# Streams optimization
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active rehashing
activerehashing yes

# Client output buffer limits
# client-output-buffer-limit <class> <hard limit> <soft limit> <soft seconds>
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Frequency of rehashing the main hash table
hz 10

# Enable active defragmentation
# activedefrag yes
# active-defrag-ignore-bytes 100mb
# active-defrag-threshold-lower 10
# active-defrag-threshold-upper 100
# active-defrag-cycle-min 1
# active-defrag-cycle-max 25

# ------------------------------------------------------------------------------
# NOTES
# ------------------------------------------------------------------------------
# This configuration prioritizes:
# 1. Data durability (AOF enabled)
# 2. Performance (reasonable defaults)
# 3. Docker compatibility (network bindings)
#
# For production tuning, monitor:
# - Memory usage (INFO memory)
# - Hit rate (INFO stats | grep keyspace)
# - Slow queries (SLOWLOG GET 10)
# - Connected clients (INFO clients)
