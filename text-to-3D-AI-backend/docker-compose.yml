# Minimal docker-compose for local dev testing
services:
  redis:
    image: redis:7.2-alpine
    container_name: optiforge_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - optiforge_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  optiforge_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
